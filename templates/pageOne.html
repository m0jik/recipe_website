<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> New Recipe </title>
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h2> New Recipe</h2>
        </div>
        <form action="/recipes/v1/new" method="POST" enctype="multipart/form-data">
            <div class="card-body">
                <div class="field">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required placeholder="e.g Chicken Pasta" value="{{ .Title }}">
                </div>
                <div class="field">
                    <label for="myfile">Image</label>
                    <input type="file" id="myfile" name="myfile" accept="image/jpeg,image/png">
                </div>

                <div class="field">
                    <label for="description"> Description </label>
                    <textarea id="description" name="description" placeholder="Describe the dish (optional)">{{ .Description }}</textarea>
                </div>
            </div>

            <div class="card-footer">
                <button type="submit">Next</button>
            </div>
        </form>
    </div>

</body>
</html>
