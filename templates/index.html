<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Home</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body>
        <header class="navbar">
            <div class="nav-left">
                <div class="logo">Recipe App</div>
            </div>
            <div class="nav-center">
                <form method="GET" action="/" class="search-form">
                    <input type="text" name="query" placeholder="Search recipes..."value="{{.Query}}">
                </form>
            </div>
            <div class="nav-right">
                {{ if .Username }}
                    <span class="welcome">Hello, {{ .Username }}</span>
                    <a href="/recipes/v1/new">Create Recipe</a>
                    <a href="/recipes/v1/myRecipe">My Recipes</a>
                    <a href="/users/v1/logout">Logout</a>
                {{ else }}
                    <a href="/users/v1/login">Login</a>
                    <a href="/users/v1/register">Register</a>
                {{ end }}
            </div>
        </header>
        <main class="container">
            <section class="recipes">
                <h2>
                    {{ if .Query }}
                        Results for "{{ .Query }}"
                    {{ else }}
                        Featured Recipes
                    {{ end }}
                </h2>
                <div class="recipe-grid">
                    {{ range .Recipes }}
                        <div class="recipe-card">
                            <h3>{{ .Title }}</h3>
                            <a href="/recipes/v1/{{ .ID }}">View Recipe</a>
                        </div>
                    {{ else }}
                        <p>No recipes found.</p>
                    {{ end }}
                </div>
            </section>
        </main>
    </body>
</html>
