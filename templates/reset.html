<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Reset Password</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body class="auth-page">
        <div class="auth-container">
            <h2>Reset Password</h2>
            <form method="POST">
                <input type="hidden" name="token" value="{{.Token}}"><br>
                <label>New Password: <input name="password" type="password" placeholder="New password" required></label><br>
                <label>Confirm New Password: <input name="confirm_password" type="password" placeholder="Confirm new password" required></label><br>
                <button type="submit">Reset Password</button>
            </form>
        </div>
    </body>
</html>
