<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Reset Password</title>
    </head>
    <body>
        <h1>Reset Password</h1>
        <form method="POST">
            <input type="hidden" name="token" value="{{.Token}}"><br>
            <input name="password" type="password" placeholder="New password" required><br>
            <button type="submit">Reset Password</button>
        </form>
    </body>
</html>
