<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Login</title>
    </head>
    <body>
        <h1>Login</h1>
        <form method="post" action="/users/v1/login">
            <label>Username: <input name="username" type="text" required></label><br>
            <label>Password: <input name="password" type="password" required></label><br>
            <button type="submit">Login</button>
        </form>
        <a href="/users/v1/register">Regiester</a>
        <a href="/users/v1/request_reset">Forgot Password?</a>
    </body>
</html>
