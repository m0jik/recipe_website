<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Login</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body class="auth-page">
        <div class="auth-container">
            <h2>Login</h2>
            <form method="post" action="/users/v1/login">
                <label>Email: <input name="email" type="email" placeholder="Email" required></label><br>
                <label>Password: <input name="password" type="password" placeholder="Password" required></label><br>
                <button type="submit">Login</button>
            </form>
            <p>
                <a href="/users/v1/register">Register</a> | 
                <a href="/users/v1/request_reset">Forgot Password?</a>
            </p>
        </div>
    </body>
</html>
